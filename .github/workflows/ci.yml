name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint:migrations

      - run: pnpm lint

      # Deterministic eval-harness unit suite (contract + judge). Free + fast.
      # The live LLM eval (pnpm test:eval) is run manually — it spends tokens
      # against the OpenRouter cap and hits Postgres, so it is not a CI gate.
      - run: pnpm test

      - run: pnpm build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: ci-placeholder-secret
